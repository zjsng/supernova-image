name: Performance Regression

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - run: BENCH_PROFILE=pr BENCH_BASELINE_BACKEND=fflate bun run bench:hdr

      - run: BENCH_REQUIRE_BASELINE=true BENCH_MAX_REGRESSION_PCT=20 BENCH_MAX_SIZE_REGRESSION_PCT=0 bun run bench:compare
